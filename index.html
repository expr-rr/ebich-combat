<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #02040a; color: white; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .active-scale:active { transform: scale(0.95); }
        .tab-btn-active { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .floating-text { position: absolute; pointer-events: none; animation: floatUp 0.8s ease-out forwards; font-weight: 900; z-index: 50; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-200px); opacity: 0; } }
        .online-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body>

    <div id="afk-modal" class="hidden fixed inset-0 z-[200] bg-black/90 flex items-center justify-center p-6 backdrop-blur-md">
        <div class="glass w-full max-w-sm p-8 rounded-[40px] text-center border-yellow-500/20 shadow-2xl">
            <div class="text-6xl mb-4 text-yellow-500">💤</div>
            <h2 class="text-2xl font-black italic uppercase italic text-white">С возвращением!</h2>
            <div id="afk-value" class="text-4xl font-black text-yellow-400 py-6 italic tracking-tighter"></div>
            <button onclick="closeAfk()" class="w-full bg-yellow-500 text-black p-4 rounded-2xl font-black uppercase italic active:scale-95 transition-transform">Забрать</button>
        </div>
    </div>

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#02040a] flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-4xl font-black italic mb-8 text-blue-500 uppercase italic">ЁБЫЧ КОМБАТ</h1>
        <div class="glass w-full max-w-sm p-8 rounded-[40px] space-y-4 shadow-2xl border-white/5 text-center">
            <input id="auth-user" type="text" placeholder="НИКНЕЙМ" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-center uppercase font-black text-sm text-white">
            <input id="auth-pass" type="password" placeholder="ПАРОЛЬ" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-center text-white">
            <div class="pt-4 space-y-3">
                <button onclick="handleAuth('login')" class="w-full bg-blue-600 p-4 rounded-2xl font-black active:scale-95 transition-all uppercase italic">Войти</button>
                <button onclick="handleAuth('register')" class="w-full text-white/30 text-[10px] font-bold uppercase tracking-widest">Создать аккаунт</button>
            </div>
            <p id="auth-error" class="text-red-500 text-[10px] font-bold hidden"></p>
        </div>
    </div>

    <div id="game-content" class="hidden h-screen flex flex-col p-4 pb-24">
        <div class="grid grid-cols-4 gap-1 mb-6 h-16 text-center font-bold">
            <div class="glass p-2 rounded-xl flex flex-col justify-center font-bold"><div class="text-[7px] text-white/40 uppercase">Клик</div><div id="ui-tap" class="text-[9px] text-cyan-400 italic font-black">0</div></div>
            <div class="glass p-2 rounded-xl flex flex-col justify-center font-bold"><div class="text-[7px] text-white/40 uppercase">Буст</div><div id="ui-mult" class="text-[9px] text-orange-400 italic font-black">x1</div></div>
            <div class="glass p-2 rounded-xl flex flex-col justify-center font-bold"><div class="text-[7px] text-white/40 uppercase">Престиж</div><div id="ui-prestige" class="text-[9px] text-purple-400 italic font-black">0</div></div>
            <div class="glass p-2 rounded-xl flex flex-col justify-center font-bold"><div class="text-[7px] text-white/40 uppercase font-black">Гранд</div><div id="ui-grand" class="text-[9px] text-red-400 italic font-black tracking-tighter">#0</div></div>
        </div>

        <div id="screen-game" class="flex-1 flex flex-col items-center justify-between py-8 text-center">
            <div id="balance" class="text-5xl font-black italic tracking-tighter text-white">0</div>
            <div id="hero-btn" class="w-64 h-64 rounded-full glass border-4 border-white/10 flex items-center justify-center overflow-hidden active-scale shadow-[0_0_50px_rgba(59,130,246,0.2)]">
                <img id="hero-img" src="/images/hero1.png" class="w-full h-full object-cover">
            </div>
            <div id="display-name" class="text-white/10 font-black tracking-[10px] text-[10px] uppercase italic">ИГРОК</div>
        </div>

        <div id="screen-shop" class="hidden flex-1 overflow-y-auto px-2 space-y-3 pb-10">
            <h2 class="text-center text-xl font-black mb-4 uppercase italic">Рынок</h2>
            <div id="shop-list" class="space-y-3"></div>
        </div>

        <div id="screen-prestige" class="hidden flex-1 flex flex-col items-center px-6 pt-4 text-center">
            <h2 class="text-center text-3xl font-black mb-4 uppercase text-purple-500 italic">Престиж</h2>
            <img id="prestige-hero-img" src="/images/hero1.png" class="w-40 h-40 rounded-full border-4 border-purple-500 mb-8 shadow-xl">
            <div id="prestige-action-container" class="w-full"></div>
        </div>

        <div id="screen-leaders" class="hidden flex-1 flex flex-col px-2 overflow-hidden">
            <h2 class="text-center text-3xl font-black mb-4 uppercase text-cyan-400 italic">Лидеры</h2>
            <div id="leader-list" class="space-y-2 overflow-y-auto max-h-[65vh] pb-10"></div>
        </div>

        <div class="fixed bottom-6 left-0 right-0 flex justify-center z-50">
            <div class="glass rounded-full p-1 flex w-[95%] h-14 shadow-2xl border-white/5">
                <button onclick="showTab('game', event)" class="tab-btn flex-1 rounded-full font-black text-[9px] tab-btn-active uppercase tracking-tighter italic">Игра</button>
                <button onclick="showTab('shop', event)" class="tab-btn flex-1 rounded-full font-black text-[9px] uppercase tracking-tighter italic">Рынок</button>
                <button onclick="showTab('prestige', event)" class="tab-btn flex-1 rounded-full font-black text-[9px] uppercase tracking-tighter italic">Престиж</button>
                <button onclick="showTab('leaders', event)" class="tab-btn flex-1 rounded-full font-black text-[9px] uppercase tracking-tighter italic">Лидеры</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let isLoaded = false;
        let isSaving = false;
        const defaultShop = [
            { id: 1, name: "х5 Клик",  plus: 5, baseCost: 50, cost: 50, growth: 2.0 },
            { id: 2, name: "х25 Клик", plus: 25, baseCost: 500, cost: 500, growth: 2.2 },
            { id: 3, name: "х100 Клик", plus: 100, baseCost: 5000, cost: 5000, growth: 2.4 },
            { id: 4, name: "х500 Клик", plus: 500, baseCost: 50000, cost: 50000, growth: 2.6 },
            { id: 5, name: "х2500 Кл", plus: 2500, baseCost: 500000, cost: 500000, growth: 3.0 },
            { id: 6, name: "х10К Клик", plus: 10000, baseCost: 5000000, cost: 5000000, growth: 3.5 },
            { id: 7, name: "х50К Клик", plus: 50000, baseCost: 50000000, cost: 50000000, growth: 4.0 }
        ];
        let state = { username: "", coins: 0, tapPower: 1, multiplier: 1, prestige: 0, grand: 0, c_prest_current: 100000, shop: JSON.parse(JSON.stringify(defaultShop)) };

        async function handleAuth(type) {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            const res = await fetch(`/api/${type}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ username: user, password: pass }) });
            const resData = await res.json();
            if (resData.status === 'success') {
                if (type === 'login') {
                    state = {...state, ...resData.data};
                    if (resData.data.shop && resData.data.shop.length > 0) { resData.data.shop.forEach((item, index) => { if (state.shop[index]) state.shop[index].cost = item.cost; }); }
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('game-content').classList.remove('hidden');
                    document.getElementById('display-name').innerText = state.username;
                    isLoaded = true; updateUI(); setInterval(saveToServer, 5000);
                    if (resData.afk && resData.afk.coins > 0.1) { document.getElementById('afk-value').innerText = "+" + format(resData.afk.coins); document.getElementById('afk-modal').classList.remove('hidden'); }
                } else { alert(resData.message); }
            } else { const err = document.getElementById('auth-error'); err.innerText = resData.message; err.classList.remove('hidden'); }
        }

        function closeAfk() { document.getElementById('afk-modal').classList.add('hidden'); tg.HapticFeedback.notificationOccurred('success'); }

        async function saveToServer() {
            if (!isLoaded || isSaving) return;
            isSaving = true;
            try {
                const res = await fetch('/api/save', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(state) });
                if (res.ok) {
                    const result = await res.json();
                    // Теперь работаем только с дельтой от админа
                    if (result.admin_delta && Math.abs(result.admin_delta) > 0.01) {
                        state.coins += result.admin_delta;
                        updateUI();
                        const txt = result.admin_delta > 0 ? `+${format(result.admin_delta)} от ADMIN` : `-${format(Math.abs(result.admin_delta))} от ADMIN`;
                        createFloatingText(window.innerWidth/2, window.innerHeight/2, txt);
                        tg.HapticFeedback.notificationOccurred(result.admin_delta > 0 ? 'success' : 'error');
                    }
                }
            } catch(e) {} finally { isSaving = false; }
        }

        function format(val) {
            const s = ["", "K", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc"];
            if (val < 1000) return Math.floor(val);
            const exp = Math.floor(Math.log10(val) / 3);
            const index = Math.min(exp, s.length - 1);
            return (val / Math.pow(1000, index)).toFixed(1) + s[index];
        }

        function updateUI() {
            document.getElementById('balance').innerText = format(state.coins);
            document.getElementById('ui-tap').innerText = '+' + format(state.tapPower * state.multiplier);
            document.getElementById('ui-mult').innerText = 'x' + format(state.multiplier);
            document.getElementById('ui-prestige').innerText = state.prestige >= 7 ? "MAX" : state.prestige;
            document.getElementById('ui-grand').innerText = '#' + state.grand;
            let imgIdx = state.prestige === 0 ? 1 : state.prestige === 1 ? 2 : state.prestige === 2 ? 3 : state.prestige === 3 ? 5 : state.prestige === 4 ? 6 : state.prestige === 5 ? 7 : state.prestige === 6 ? 8 : 9;
            document.getElementById('hero-img').src = `/images/hero${imgIdx}.png`;
            document.getElementById('prestige-hero-img').src = `/images/hero${imgIdx}.png`;
            renderShop(); renderPrestige();
        }

        function renderShop() {
            const list = document.getElementById('shop-list'); if (!list) return;
            list.innerHTML = state.shop.map(item => `
                <div class="glass flex justify-between items-center p-4 rounded-2xl">
                    <div><div class="font-bold text-sm text-white">${item.name}</div><div class="text-[10px] text-yellow-500 font-mono italic font-bold tracking-tighter">${format(item.cost)} 🪙</div></div>
                    <button onclick="buyUpgrade(${item.id})" class="px-5 py-2 rounded-xl text-[10px] font-black italic ${state.coins >= item.cost ? 'bg-white text-black' : 'bg-white/5 text-white/20'}" ${state.coins < item.cost ? 'disabled' : ''}>UP</button>
                </div>
            `).join('');
        }

        function buyUpgrade(id) {
            const item = state.shop.find(i => i.id === id);
            if (state.coins >= item.cost) { state.coins -= item.cost; state.tapPower += item.plus; item.cost *= item.growth; updateUI(); saveToServer(); tg.HapticFeedback.impactOccurred('medium'); }
        }

        function renderPrestige() {
            const container = document.getElementById('prestige-action-container'); if (!container) return;
            if (state.prestige < 7) {
                const canAfford = state.coins >= state.c_prest_current;
                container.innerHTML = `<button onclick="doPrestige()" class="w-full py-5 rounded-3xl glass border-purple-500/30 flex flex-col items-center active-scale ${canAfford ? '' : 'opacity-40'}" ${!canAfford ? 'disabled' : ''}>
                    <span class="text-purple-400 font-black tracking-widest text-lg uppercase italic font-black">Престиж LVL ${state.prestige + 1}</span>
                    <span class="text-[10px] text-gray-400 mt-1 uppercase italic font-bold tracking-tighter">Цена: ${format(state.c_prest_current)}</span>
                </button>`;
            } else {
                const grandCost = (state.c_prest_current / 6) * 2;
                const canAfford = state.coins >= grandCost;
                container.innerHTML = `<button onclick="doGrandReset()" class="w-full py-5 rounded-3xl glass border-red-500/50 flex flex-col items-center active-scale ${canAfford ? '' : 'opacity-40'}" ${!canAfford ? 'disabled' : ''}>
                    <span class="text-red-500 font-black tracking-widest text-3xl uppercase text-center font-black italic">ГРАНД-РЕСЕТ 🌀</span>
                    <span class="text-[10px] text-white/30 mt-1 uppercase italic font-bold tracking-tighter">Цена: ${format(grandCost)}</span>
                </button>`;
            }
        }

        function doPrestige() {
            if (state.coins >= state.c_prest_current) {
                state.coins = 0; state.tapPower = 1; state.multiplier *= 2.0; state.prestige += 1; state.c_prest_current *= 6.0;
                state.shop = JSON.parse(JSON.stringify(defaultShop)); updateUI(); saveToServer(); tg.HapticFeedback.notificationOccurred('warning');
            }
        }

        function doGrandReset() {
            const grandCost = (state.c_prest_current / 6) * 2;
            if (state.coins >= grandCost) {
                state.grand += 1; state.multiplier = Math.pow(2.0, state.grand); state.c_prest_current = 100000 * Math.pow(6.0, state.grand);
                state.coins = 0; state.tapPower = 1; state.prestige = 0; state.shop = JSON.parse(JSON.stringify(defaultShop));
                updateUI(); saveToServer(); tg.HapticFeedback.notificationOccurred('error');
            }
        }

        async function renderLeaders() {
            const list = document.getElementById('leader-list');
            const res = await fetch('/api/leaderboard');
            const leaders = await res.json();
            const now = Math.floor(Date.now() / 1000);
            list.innerHTML = leaders.map((l, i) => {
                const isOnline = (now - l.last_active) < 60;
                const adminBtns = state.username === 'admin' ? `
                    <div class="flex gap-2 mt-3 pt-3 border-t border-white/10">
                        <button onclick="adminAction('${l.name}', 'add')" class="flex-1 bg-green-600/20 text-green-400 text-[9px] py-2 rounded-lg font-black uppercase border border-green-600/30">+ Выдать</button>
                        <button onclick="adminAction('${l.name}', 'remove')" class="flex-1 bg-red-600/20 text-red-400 text-[9px] py-2 rounded-lg font-black uppercase border border-red-600/30">- Забрать</button>
                    </div>
                ` : '';
                return `
                    <div class="glass flex flex-col p-4 rounded-2xl border-l-4 ${l.name === state.username ? 'border-blue-500 bg-white/5' : 'border-transparent'}">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-sm font-black italic">
                                <span class="online-dot ${isOnline ? 'bg-green-500' : 'bg-red-500'}"></span>
                                <span class="text-gray-500 mr-1">#${i+1}</span> ${l.name}
                            </span>
                            <span class="text-sm font-black text-cyan-400 italic">${format(l.balance)}</span>
                        </div>
                        <div class="flex justify-between text-[8px] uppercase font-bold tracking-widest text-white/40 italic">
                            <span>Престиж: <span class="text-purple-400">${l.prestige}</span> <small>(G#${l.grand})</small></span>
                            <span>Клик: <span class="text-orange-400">${format(l.click)}</span></span>
                        </div>
                        ${adminBtns}
                    </div>
                `;
            }).join('');
        }

        async function adminAction(target, action) {
            const amount = prompt(`Сумма для ${target}:`);
            if (!amount || isNaN(amount) || parseFloat(amount) <= 0) return;
            const res = await fetch('/api/admin/edit_balance', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ admin_username: 'admin', target_username: target, amount: parseFloat(amount), action: action }) });
            if (res.ok) { tg.HapticFeedback.notificationOccurred('success'); renderLeaders(); }
        }

        function showTab(tab, event) {
            ['screen-game', 'screen-shop', 'screen-prestige', 'screen-leaders'].forEach(id => document.getElementById(id)?.classList.add('hidden'));
            document.getElementById(`screen-${tab}`)?.classList.remove('hidden');
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.classList.remove('tab-btn-active'));
            if (event) event.currentTarget.classList.add('tab-btn-active');
            if (tab === 'leaders') renderLeaders();
            updateUI();
        }

        document.getElementById('hero-btn').addEventListener('click', (e) => {
            const val = state.tapPower * state.multiplier;
            state.coins += val;
            tg.HapticFeedback.impactOccurred('rigid');
            createFloatingText(e.clientX, e.clientY, `+${format(val)}`);
            updateUI();
        });

        function createFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text text-3xl text-white italic';
            el.style.left = `${x}px`; el.style.top = `${y}px`;
            el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }
    </script>
</body>
</html>
