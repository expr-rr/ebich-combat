<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #02040a; color: white; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .floating-text { position: absolute; pointer-events: none; animation: floatUp 0.8s ease-out forwards; font-weight: 900; z-index: 50; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-200px); opacity: 0; } }
        .active-scale:active { transform: scale(0.95); }
        .tab-btn-active { background: rgba(255, 255, 255, 0.1); color: #fff; }
    </style>
</head>
<body>
    <div id="app" class="h-screen flex flex-col p-4 pb-24">
        
        <!-- СТАТИСТИКА -->
        <div class="grid grid-cols-4 gap-1 mb-6 h-16">
            <div class="glass p-2 rounded-xl text-center flex flex-col justify-center">
                <div class="text-[7px] text-gray-500 uppercase font-bold">Клик</div>
                <div id="ui-tap" class="text-[10px] text-cyan-400 font-bold">...</div>
            </div>
            <div class="glass p-2 rounded-xl text-center flex flex-col justify-center">
                <div class="text-[7px] text-gray-500 uppercase font-bold">Буст</div>
                <div id="ui-mult" class="text-[10px] text-orange-400 font-bold">...</div>
            </div>
            <div class="glass p-2 rounded-xl text-center flex flex-col justify-center">
                <div class="text-[7px] text-gray-500 uppercase font-bold">Престиж</div>
                <div id="ui-prestige" class="text-[10px] text-purple-400 font-bold">...</div>
            </div>
            <div class="glass p-2 rounded-xl text-center flex flex-col justify-center">
                <div class="text-[7px] text-gray-500 uppercase font-bold">Гранд</div>
                <div id="ui-grand" class="text-[10px] text-red-400 font-bold">...</div>
            </div>
        </div>

        <!-- ВКЛАДКА ИГРЫ -->
        <div id="screen-game" class="flex-1 flex flex-col items-center justify-between py-8">
            <div id="balance" class="text-5xl font-black italic text-white drop-shadow-lg">0</div>
            <div id="hero-btn" class="w-64 h-64 rounded-full glass border-4 border-white/10 flex items-center justify-center overflow-hidden active-scale shadow-[0_0_50px_rgba(59,130,246,0.2)]">
                <img id="hero-img" src="/images/hero1.png" class="w-full h-full object-cover">
            </div>
            <div class="text-white/10 font-black tracking-[10px] text-xs text-center uppercase">Ёбыч Комбат</div>
        </div>

        <!-- ВКЛАДКА РЫНОК -->
        <div id="screen-shop" class="hidden flex-1 overflow-y-auto px-2 space-y-3 pb-6">
            <h2 class="text-center text-xl font-black mb-4 uppercase">Рынок</h2>
            <div id="shop-list" class="space-y-3"></div>
        </div>

        <!-- ВКЛАДКА ПРЕСТИЖ -->
        <div id="screen-prestige" class="hidden flex-1 flex flex-col items-center px-6 pt-4">
            <h2 class="text-center text-xl font-black mb-4 uppercase text-purple-500 italic">Престиж</h2>
            <img id="prestige-hero-img" src="/images/hero1.png" class="w-40 h-40 rounded-full border-4 border-purple-500 mb-8 shadow-xl shadow-purple-500/20">
            <div id="prestige-action-container" class="w-full"></div>
        </div>

        <!-- ВКЛАДКА ЛИДЕРЫ -->
        <div id="screen-leaders" class="hidden flex-1 flex flex-col px-2 overflow-hidden">
            <h2 class="text-center text-xl font-black mb-4 uppercase text-cyan-400 italic">Лидеры</h2>
            <div id="leader-list" class="space-y-2 overflow-y-auto max-h-[70vh]"></div>
        </div>

        <!-- ТАБ-БАР -->
        <div class="fixed bottom-6 left-0 right-0 flex justify-center z-50">
            <div class="glass rounded-full p-1 flex w-[95%] h-14">
                <button onclick="showTab('game', event)" class="tab-btn flex-1 rounded-full font-black text-[9px] tab-btn-active uppercase">Игра</button>
                <button onclick="showTab('shop', event)" class="tab-btn flex-1 rounded-full font-black text-[9px] uppercase">Рынок</button>
                <button onclick="showTab('prestige', event)" class="tab-btn flex-1 rounded-full font-black text-[9px] uppercase">Престиж</button>
                <button onclick="showTab('leaders', event)" class="tab-btn flex-1 rounded-full font-black text-[9px] uppercase">Лидеры</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tgUser = tg.initDataUnsafe?.user || { id: 1, first_name: "Игрок", username: "anonymous" };
        const myName = tgUser.username ? `@${tgUser.username}` : tgUser.first_name;

        let isLoaded = false; // Флаг загрузки данных

        let state = {
            coins: 0, tapPower: 1, multiplier: 1, prestige: 0, grand: 0, c_prest_current: 100000,
            shop: [
                { id: 1, name: "х5 Клик",  plus: 5,     baseCost: 50,       cost: 50,       growth: 2.0 },
                { id: 2, name: "х25 Клик", plus: 25,    baseCost: 500,      cost: 500,      growth: 2.2 },
                { id: 3, name: "х100 Клик",plus: 100,   baseCost: 5000,     cost: 5000,     growth: 2.4 },
                { id: 4, name: "х500 Клик",plus: 500,   baseCost: 50000,    cost: 50000,    growth: 2.6 },
                { id: 5, name: "х2500 Кл", plus: 2500,  baseCost: 500000,   cost: 500000,   growth: 3.0 },
                { id: 6, name: "х10К Клик",plus: 10000, baseCost: 5000000,  cost: 5000000,  growth: 3.5 },
                { id: 7, name: "х50К Клик",plus: 50000, baseCost: 50000000, cost: 50000000, growth: 4.0 }
            ]
        };

        function format(val) {
            const s = ["", "K", "M", "B", "T", "Qa", "Qi"];
            if (val < 1000) return Math.floor(val);
            const exp = Math.floor(Math.log10(val) / 3);
            const index = Math.min(exp, s.length - 1);
            return (val / Math.pow(1000, index)).toFixed(1) + s[index];
        }

        function updateUI() {
            document.getElementById('balance').innerText = format(state.coins);
            document.getElementById('ui-tap').innerText = '+' + format(state.tapPower * state.multiplier);
            document.getElementById('ui-mult').innerText = 'x' + format(state.multiplier);
            document.getElementById('ui-prestige').innerText = state.prestige >= 7 ? "MAX" : state.prestige;
            document.getElementById('ui-grand').innerText = '#' + state.grand;
            
            let p = state.prestige;
            let imgIdx = p === 0 ? 1 : p === 1 ? 2 : p === 2 ? 3 : p === 3 ? 5 : p === 4 ? 6 : p === 5 ? 7 : p === 6 ? 8 : 9;
            const heroPath = `/images/hero${imgIdx}.png`;
            document.getElementById('hero-img').src = heroPath;
            document.getElementById('prestige-hero-img').src = heroPath;

            renderShop();
            renderPrestige();
        }

        // --- API СВЯЗЬ ---
        async function loadFromServer() {
            try {
                const res = await fetch(`/api/load?user_id=${tgUser.id}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data) {
                        state = {...state, ...data};
                        console.log("Данные успешно подтянуты из Supabase");
                    }
                }
            } catch(e) {
                console.error("Ошибка загрузки данных", e);
            } finally {
                isLoaded = true;
                updateUI();
            }
        }

        async function saveToServer() {
            if (!isLoaded) return; // Не сохраняем, если данные еще не загрузились
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        user_id: tgUser.id,
                        username: myName,
                        ...state
                    })
                });
            } catch(e) {
                console.error("Ошибка автосохранения", e);
            }
        }

        // --- ЛОГИКА ИГРЫ ---
        document.getElementById('hero-btn').addEventListener('click', (e) => {
            if (!isLoaded) return;
            const val = state.tapPower * state.multiplier;
            state.coins += val;
            tg.HapticFeedback.impactOccurred('rigid');
            createFloatingText(e.clientX, e.clientY, `+${format(val)}`);
            updateUI();
        });

        function createFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text text-3xl text-white italic';
            el.style.left = `${x}px`; el.style.top = `${y}px`;
            el.innerText = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = state.shop.map(item => `
                <div class="glass flex justify-between items-center p-4 rounded-2xl">
                    <div>
                        <div class="font-bold text-sm text-white">${item.name}</div>
                        <div class="text-[10px] text-yellow-500 font-mono">${format(item.cost)} 🪙</div>
                    </div>
                    <button onclick="buyUpgrade(${item.id})" class="px-5 py-2 rounded-xl text-[10px] font-black italic ${state.coins >= item.cost ? 'bg-white text-black' : 'bg-white/5 text-white/20'}" ${state.coins < item.cost ? 'disabled' : ''}>UP</button>
                </div>
            `).join('');
        }

        function buyUpgrade(id) {
            const item = state.shop.find(i => i.id === id);
            if (state.coins >= item.cost) {
                state.coins -= item.cost;
                state.tapPower += item.plus;
                item.cost *= item.growth;
                updateUI();
                saveToServer();
            }
        }

        function renderPrestige() {
            const container = document.getElementById('prestige-action-container');
            if (state.prestige < 7) {
                const canAfford = state.coins >= state.c_prest_current;
                container.innerHTML = `<button onclick="doPrestige()" class="w-full py-5 rounded-3xl glass border-purple-500/30 flex flex-col items-center active-scale ${canAfford ? '' : 'opacity-40'}" ${!canAfford ? 'disabled' : ''}>
                    <span class="text-purple-400 font-black tracking-widest text-lg italic uppercase">ПРЕСТИЖ LVL ${state.prestige + 1}</span>
                    <span class="text-[10px] text-gray-400 mt-1 uppercase italic">ЦЕНА: ${format(state.c_prest_current)}</span>
                </button>`;
            } else {
                const grandCost = (state.c_prest_current / 6) * 2;
                const canAfford = state.coins >= grandCost;
                container.innerHTML = `<button onclick="doGrandReset()" class="w-full py-5 rounded-3xl glass border-red-500/50 flex flex-col items-center active-scale ${canAfford ? '' : 'opacity-40'}" ${!canAfford ? 'disabled' : ''}>
                    <span class="text-red-500 font-black tracking-widest text-lg italic uppercase text-center">ГРАНД-РЕСЕТ 🌀</span>
                    <span class="text-[10px] text-white/30 mt-1 uppercase italic">ЦЕНА: ${format(grandCost)}</span>
                </button>`;
            }
        }

        function doPrestige() {
            if (state.coins >= state.c_prest_current) {
                state.coins = 0; state.tapPower = 1; state.multiplier *= 2.0;
                state.prestige += 1; state.c_prest_current *= 6;
                state.shop.forEach(i => i.cost = i.baseCost);
                showTab('game'); updateUI(); saveToServer();
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function doGrandReset() {
            const grandCost = (state.c_prest_current / 6) * 2;
            if (state.coins >= grandCost) {
                state.grand += 1; state.multiplier = Math.pow(2.0, state.grand);
                state.coins = 0; state.tapPower = 1; state.prestige = 0;
                state.c_prest_current = 100000 * Math.pow(2.0, state.grand);
                state.shop.forEach(i => i.cost = i.baseCost);
                showTab('game'); updateUI(); saveToServer();
                tg.HapticFeedback.notificationOccurred('warning');
            }
        }

        async function renderLeaders() {
            const list = document.getElementById('leader-list');
            list.innerHTML = '<div class="text-center py-10 opacity-20 italic">Загрузка рейтинга...</div>';
            try {
                const res = await fetch('/api/leaderboard');
                const leaders = await res.json();
                list.innerHTML = leaders.map((l, i) => `
                    <div class="glass flex justify-between p-4 rounded-2xl items-center border-l-4 ${l.name === myName ? 'border-cyan-500 bg-white/5' : 'border-transparent'}">
                        <span class="text-xs font-bold font-mono"><span class="text-gray-500 italic mr-1">#${i+1}</span> ${l.name}</span>
                        <div class="text-right">
                            <div class="text-xs font-black text-cyan-400 italic">${format(l.balance)} 🪙</div>
                            <div class="text-[8px] text-red-500 font-bold uppercase">Grand #${l.grand}</div>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                list.innerHTML = '<div class="text-center py-10 text-red-500 opacity-50">Ошибка сети</div>';
            }
        }

        function showTab(tab, event) {
            ['screen-game', 'screen-shop', 'screen-prestige', 'screen-leaders'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(`screen-${tab}`).classList.remove('hidden');
            
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(b => b.classList.remove('tab-btn-active'));
            if (event) event.currentTarget.classList.add('tab-btn-active');
            
            if (tab === 'leaders') renderLeaders();
            updateUI();
        }

        // СТАРТ
        loadFromServer();
        setInterval(saveToServer, 5000); // Автосохранение каждые 5 секунд
    </script>
</body>
</html>
